<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
</head>
<body>
    <h2>Cadastro de Usuário</h2>

    <form method="POST">

        <fieldset>
    
            <legend>Dados Pessoais</legend>

            <!--Nome-->
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>
    
            <!--Email-->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required><br><br>
    
            <!--Senha-->
            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" minlength="6" placeholder="Digite sua senha" required><br><br>
            
            <!--Confirmar Senha-->
            <label for="confirmar_senha">Confirmar Senha:</label><br>
            <input type="password" id="confirmar_senha" minlength="6" name="confirmar_senha" placeholder="Confirme sua senha" required required><br><br>
    
            <!--Data de Nascimento -->
            <label for="data_nascimento">Data de Nascimento:</label><br>
            <input type="date" id="data_nascimento" name="data_nascimento" required><br><br>
        </fieldset><br>
        
       
        <fieldset>
            
            <legend>Informações Adicionais</legend>

            <!--Gênero-->
            <p>Gênero:</p>
            <input type="radio" id="masc" name="genero" value="Masculino">
            <label for="masc">Masculino</label>
            <input type="radio" id="fem" name="genero" value="Feminino">
            <label for="fem">Feminino</label>
            <input type="radio" id="outro" name="genero" value="Outro">
            <label for="outro">Outro</label><br><br>
            
            <!--Telefone -->
            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" name="telefone"><br>

            <!--Interesses -->
            <p>Interesses:</p>
            <input type="checkbox" id="tecnologia" name="tecnologia" value="tecnologia">
            <label for="tecnologia">Tecnologia</label>

            <input type="checkbox" id="esportes" name="esportes" value="esportes">
            <label for="esportes">Esportes</label>

            <input type="checkbox" id="musica" name="musica" value="musica">
            <label for="musica">Música</label>

            <input type="checkbox" id="jogos" name="jogos" value="jogos">
            <label for="jogos">Jogos</label><br><br>
            
            <!--País-->
            <label for="pais">Selecione seu País:</label>
            <select id="pais" name="pais">
                <option value="alemanha">Alemanha</option>
                <option value="Brasil">Brasil</option>
                <option value="eua">Estados Unidos</option>
                <option value="franca">França</option>
                <option value="japao">Japão</option>    
            </select><br><br>

        </fieldset><br>

        
        <fieldset>
    
            <legend>Outros</legend>

            <!-- Foto -->
            <label for="foto">Foto de perfil:</label><br>
            <input type="file" id="foto" name="foto"><br><br>

            <!-- Cor favorita -->
            <label for="cor">Cor favorita:</label><br>
            <input type="color" id="cor" name="cor"><br><br>

            <!-- Nivel de Satisfação -->
            <label for="satisfacao">Nível de satisfação (0 a 10):</label><br>
            <input type="range" id="satisfacao" name="satisfacao" min="0" max="10"><br><br>

            <!-- Notificações -->
            <input type="checkbox" id="notificacoes" name="notificacoes">
            <label for="notificacoes">Desejo receber notificações por email</label><br><br>
               
        </fieldset><br>

        <fieldset>
            <legend>Mensagem</legend>

            <!--Caixa de Mensagem-->
            <label for="mensagem">Digite sua mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="30"></textarea>

        </fieldset>

        <!-- Botões -->
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>

    </form>

</body>
</html>
